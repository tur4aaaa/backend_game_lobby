name: linters
on: [push]
jobs:
  linters:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install poetry
          poetry --version
          poetry install
      - name: MyPy
        run: |
          poetry run mypy models/ database/
      - name: Vulture
        run: |
          poetry run vulture .
      - name: Ruff
        run: |
          poetry run ruff check
      - name: flake8
        run: |
          poetry run flake8 database/ main.py models/
